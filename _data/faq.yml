- q: "Can I use external data and pretrained models?"
  a: >
    Detailed rules will ship with the starter kit. In line with typical SemEval practice,
    pretrained models and external resources are generally allowed provided they are
    publicly documented and you describe them in your system paper. Any restrictions will
    be stated clearly at data release.

- q: "How do I submit my predictions?"
  a: >
    Submissions are planned through <strong>CodaBench</strong>. The competition link,
    submission format, and the official evaluation script will be posted on this page when
    the evaluation phase opens.

- q: "Is there a paper to write?"
  a: >
    Yes. Participants are encouraged to submit a system description paper, which will be
    published in the SemEval 2027 proceedings and presented at the workshop.

- q: "What does it cost, and how is the data licensed?"
  a: >
    Participation is free. The shared-task dataset is planned for release under the
    <strong>CC BY-NC-SA 4.0</strong> license for non-commercial research use.

- q: "How do I stay updated?"
  a: >
    Join the <a href="https://join.slack.com/t/mm-eval/shared_invite/zt-41j09ml4j-WMn0NzhqAgT9ZK6e1L8eBA" rel="noopener" target="_blank">community Slack</a>
    and watch the Home page news feed. All announcements, including data, baselines, and
    submission details, appear there first.
