<section class="section">
  <div class="container">
    <div class="section-heading">
      <p class="eyebrow">Timeline</p>
      <h2>Important Dates</h2>
    </div>
    <ul class="deadline-list">
      {% for item in site.data.deadlines %}
        <li><strong>{{ item.label }}</strong>: {{ item.date }}</li>
      {% endfor %}
    </ul>
  </div>
</section>
