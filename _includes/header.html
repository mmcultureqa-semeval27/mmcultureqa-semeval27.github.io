<div class="site-notice">
  <div class="container">
    <p>📢 We are also co-hosting <a href="https://imageeval2026.github.io/" rel="noopener" target="_blank">ImageEval 2026</a>, a shared task at ArabicNLP 2026, co-located with EMNLP.</p>

<header class="site-header">
  <div class="container header-inner">
    <a class="site-brand" href="{{ '/' | relative_url }}">
      <img src="{{ '/assets/images/logo-mark.svg' | relative_url }}" alt="" width="34" height="34">
      <span><b>MM</b>CultureQA&nbsp;2027</span>
    </a>

    <button class="nav-toggle" type="button" aria-label="Toggle menu" aria-expanded="false" aria-controls="primary-nav">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 7h16M4 12h16M4 17h16"/></svg>
    </button>

    <nav class="site-nav" id="primary-nav" aria-label="Primary">
      {% for item in site.data.navigation %}
        <a href="{{ item.url | relative_url }}"{% if page.url == item.url %} aria-current="page"{% endif %}>{{ item.name }}</a>
      {% endfor %}
    </nav>
  </div>
</header>
