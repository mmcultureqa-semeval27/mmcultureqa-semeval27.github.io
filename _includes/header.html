<header class="site-header">
  <div class="container header-inner">
    <div class="site-info">
      <a class="site-logo" href="{{ '/' | relative_url }}" aria-label="{{ site.title }} home">
        <img src="{{ '/assets/images/logo-mark.svg' | relative_url }}" alt="" width="44" height="44">
      </a>
      <div class="site-desc">
        <a class="site-name" href="{{ '/' | relative_url }}"><b>MM</b>CultureQA 2027</a>
        <p class="site-tagline">{{ site.tagline }}</p>
      </div>
    </div>

    <button class="nav-toggle" type="button" aria-label="Toggle menu" aria-expanded="false" aria-controls="primary-nav">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 7h16M4 12h16M4 17h16"/></svg>
    </button>

    <nav class="site-nav" id="primary-nav" aria-label="Primary">
      {% for item in site.data.navigation %}
        <a href="{{ item.url | relative_url }}"{% if page.url == item.url %} aria-current="page"{% endif %}>{{ item.name }}</a>
      {% endfor %}
    </nav>
  </div>
</header>
