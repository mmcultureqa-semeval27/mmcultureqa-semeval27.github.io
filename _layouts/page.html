---
layout: default
---

{% unless page.hide_title %}
<section class="page-title">
  <div class="container">
    {% if page.kicker %}
      <p class="eyebrow">{{ page.kicker }}</p>
    {% endif %}
    <h1>{{ page.title }}</h1>
    {% if page.summary %}
      <p>{{ page.summary }}</p>
    {% endif %}
  </div>
</section>
{% endunless %}

<section class="section">
  <div class="container content">
    {{ content }}
  </div>
</section>
